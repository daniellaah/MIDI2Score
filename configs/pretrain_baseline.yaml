model:
  vocab_size: 5000
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  activation: relu
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 256

data:
  dataset_path: data/huggingface
  split: training
  max_length: 256
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  tokenizer_path: data/tokenizer_rd.json
  random_crop: true
  crop_seed: 23
  num_workers: 0

training:
  batch_size: 4
  learning_rate: 0.001
  num_steps: 16000
  log_every: 50
  eval_every: 500
  num_eval_batches: 64
  device: auto
  save_checkpoint_path: artifacts/pretrained_decoder_baseline.pt
  save_best_checkpoint_path: artifacts/pretrained_decoder_best.pt
  resume_checkpoint_path: null
  csv_log_path: logs/pretrain_rd.csv
  tensorboard_log_dir: logs/tensorboard/pretrain_rd
