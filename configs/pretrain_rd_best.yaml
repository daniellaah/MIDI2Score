model:
  vocab_size: 5000
  d_model: 256
  nhead: 4
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.0
  activation: swiglu
  norm_type: rmsnorm
  residual_layout: pre_norm
  tie_embeddings: false
  position_encoding_type: sinusoidal
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 1024

data:
  dataset_path: data/huggingface
  split: training
  max_length: 1024
  sliding_window_stride: 256
  length_bucketing: false
  num_workers: 0

training:
  seed: 23
  batch_size: 16
  optimizer: adamw
  learning_rate: 0.0006
  weight_decay: 0.0
  grad_clip_norm: null
  label_smoothing: 0.0
  scheduler: linear
  warmup_steps: 500
  min_lr_ratio: 0.1
  num_steps: 1000000
  max_duration_seconds: 7200
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  log_every: 50
  eval_every: 500
  num_eval_batches: null
  device: auto
  save_checkpoint_path: artifacts/pretrained_decoder_rd_best.pt
  save_best_checkpoint_path: artifacts/pretrained_decoder_rd_best_best.pt
  resume_checkpoint_path: null
  csv_log_path: logs/pretrain_rd_best.csv
  tensorboard_log_dir: logs/tensorboard/pretrain_rd_best
