model:
  vocab_size: 5000
  d_model: 512
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.05
  activation: swiglu
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 1024
data:
  dataset_path: data/huggingface
  split: training
  max_length: 1024
  sliding_window_stride: 256
  bucket_padding_noise: 0.0
  max_tokens_per_batch: 16384
  pad_to_length_multiple: 64
  num_workers: 0
training:
  seed: 23
  batch_size: 64
  eval_batch_size: 16
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip_norm: 2.0
  warmup_steps: 500
  min_lr_ratio: 0.1
  num_steps: 1000000
  max_duration_seconds: 7200
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  log_every: 50
  eval_every: 500
  num_eval_batches: null
  device: auto
  save_checkpoint_path: artifacts/pretrained_decoder_rd_best.pt
  save_best_checkpoint_path: artifacts/pretrained_decoder_rd_best_best.pt
  resume_checkpoint_path: null
  csv_log_path: logs/pretrain_rd_best.csv
  tensorboard_log_dir: logs/tensorboard/pretrain_rd_best
