model:
  vocab_size: 5000
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  activation: relu
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 512

data:
  dataset_path: data/huggingface
  split: training
  max_length: 512
  sliding_window_stride: 256
  num_workers: 0

training:
  seed: 23
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip_norm: 2.0
  warmup_steps: 500
  min_lr_ratio: 0.1
  num_steps: 16000
  log_every: 50
  eval_every: 500
  num_eval_batches: 64
  device: auto
  save_checkpoint_path: artifacts/pretrained_decoder_rd_maxlen512.pt
  save_best_checkpoint_path: artifacts/pretrained_decoder_rd_maxlen512_best.pt
  resume_checkpoint_path:
  csv_log_path: logs/pretrain_rd_maxlen512.csv
  tensorboard_log_dir: logs/tensorboard/pretrain_rd_maxlen512
