model:
  vocab_size: 5000
  d_model: 512
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.05
  activation: swiglu
  positional_encoding: sinusoidal
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 1024
data:
  dataset_path: data/huggingface
  split: training
  max_length: 1024
  sliding_window_stride: 256
  length_bucketing: true
  bucket_padding_noise: 0.1
  max_tokens_per_batch: 16384
  required_batch_size_multiple: 4
  pad_to_length_multiple: 64
  num_workers: 0
training:
  seed: 23
  batch_size: 64
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip_norm: 2.0
  warmup_steps: 500
  min_lr_ratio: 0.1
  num_steps: 1000000
  max_duration_seconds: 7200
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  log_every: 50
  eval_every: 500
  num_eval_batches: null
  precision: bf16
  device: auto
