model:
  vocab_size: 5000
  d_model: 512
  nhead: 8
  num_layers: 4
  dim_feedforward: 2048
  dropout: 0.05
  activation: swiglu
  positional_encoding: rope
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  max_length: 1024
data:
  dataset_path: data/bar_aware_chunk/training_bar_chunk_encoded_overlap2_full_dataset
  split: training
  max_length: 1024
  length_bucketing: true
  bucket_padding_noise: 0.0
  max_tokens_per_batch: 16384
  pad_to_length_multiple: 64
  num_workers: 0
training:
  seed: 23
  batch_size: 64
  eval_batch_size: 16
  learning_rate: 0.0006
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip_norm: 2.0
  warmup_steps: 500
  min_lr_ratio: 0.1
  epoch: 24
  num_steps: 1000000
  max_duration_seconds: null
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001
  log_every: 50
  eval_every: 500
  num_eval_batches: null
  device: auto
  save_checkpoint_path: artifacts/pretrain_rope_overlap2_epoch24.pt
  save_best_checkpoint_path: artifacts/pretrain_rope_overlap2_epoch24_best.pt
  resume_checkpoint_path: null
  csv_log_path: logs/pretrain_rope_overlap2_epoch24.csv
  tensorboard_log_dir: logs/tensorboard/pretrain_rope_overlap2_epoch24
